<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTubeTweaks Popup</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --item-bg: #1e1e1e;
            --item-border: #333;
            --item-hover-border: #444;
            --feature-name-color: #efefef;
            --detail-text-color: #999;
            --badge-bg: #2a2a2a;
            --badge-text: #aaa;
            --badge-border: #444;
            --badge-fixed-bg: #444;
            --badge-fixed-text: #999;
            --badge-fixed-border: #555;
            --select-bg: #333;
            --select-border: #444;
            --accent-color: #3ea6ff;
            --switch-bg: #333;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f9f9f9;
                --text-color: #0f0f0f;
                --item-bg: #ffffff;
                --item-border: #e5e5e5;
                --item-hover-border: #d0d0d0;
                --feature-name-color: #0f0f0f;
                --detail-text-color: #606060;
                --badge-bg: #f2f2f2;
                --badge-text: #606060;
                --badge-border: #e5e5e5;
                --badge-fixed-bg: #e5e5e5;
                --badge-fixed-text: #606060;
                --badge-fixed-border: #d0d0d0;
                --select-bg: #f2f2f2;
                --select-border: #e5e5e5;
                --accent-color: #065fd4;
                --switch-bg: #e5e5e5;
            }
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            width: 270px;
            margin: 0;
            padding: 14px;
            user-select: none;
        }
        h1 {
            font-size: 16px;
            margin: 0 0 12px 0;
            background: linear-gradient(90deg, #3ea6ff, #ff4e45);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .feature-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 10px 12px;
            background: var(--item-bg);
            border-radius: 10px;
            border: 1px solid var(--item-border);
            gap: 6px;
            transition: border-color 0.2s;
        }
        .feature-item:hover {
            border-color: var(--item-hover-border);
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .feature-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--feature-name-color);
        }
        .detail-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-text {
            font-size: 11px;
            color: var(--detail-text-color);
            font-weight: 400;
        }

        /* Select Styles */
        .style-select {
            background-color: var(--select-bg);
            color: var(--text-color);
            border: 1px solid var(--select-border);
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            flex: 1;
        }
        
        /* Premium Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--switch-bg);
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 14px;
            width: 14px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: var(--accent-color);
        }
        input:focus + .slider {
            box-shadow: 0 0 1px var(--accent-color);
        }
        input:checked + .slider:before {
            transform: translateX(16px);
        }

        .shortcut-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .key-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--badge-bg);
            color: var(--badge-text);
            padding: 2px 8px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 10px;
            border: 1px solid var(--badge-border);
            min-width: 54px;
        }

        .key-badge-fixed {
            background: var(--badge-fixed-bg);
            color: var(--badge-fixed-text);
            border: 1px solid var(--badge-fixed-border);
            font-weight: 900;
        }

        .key-badge-official {
            background: var(--badge-bg);
            color: var(--badge-text);
            border: 1px solid var(--badge-border);
            cursor: pointer;
            transition: all 0.2s;
        }

        .key-badge-official:hover {
            color: var(--accent-color);
            border-color: var(--accent-color);
            background: rgba(62, 166, 255, 0.1);
        }

        .shortcut-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 4px;
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: var(--badge-text);
        }

        .feature-row {
            display: flex;
            gap: 8px;
            align-items: stretch;
        }
        .feature-row .feature-item {
            flex: 1;
            padding: 8px 10px;
        }
        .feature-row .feature-name {
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 2px; margin-bottom: 12px;">
        <img src="icon.png" alt="Logo" style="width: 80px; height: auto; object-fit: contain;">
        <h1 style="margin: 0;">YouTubeTweaks</h1>
    </div>
    <div class="feature-group">
        <!-- Video Quality Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Video Quality</span>
                <label class="switch">
                    <input type="checkbox" id="enableQualityCycle">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Quick Cycle HUD</span>
                    <span id="key-quality" class="key-badge key-badge-fixed"><b>Ctrl + ↑ / ↓</b></span>
                </div>
            </div>
        </div>

        <!-- Sidebar Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Comments on Right</span>
                <label class="switch">
                    <input type="checkbox" id="enableRightComments">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Side-by-side View</span>
                    <span id="key-right-comments" class="key-badge">...</span>
                </div>
            </div>
        </div>

        <!-- Native Tweaks Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Native Tweaks</span>
                <label class="switch">
                    <input type="checkbox" id="enableShortcuts">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Ask AI (Gemini)</span>
                    <span id="key-gemini" class="key-badge">...</span>
                </div>
                <div class="grid-row">
                    <span class="detail-text">Smart Comments</span>
                    <span id="key-comments" class="key-badge">...</span>
                </div>
            </div>
        </div>

        <!-- Aspect Ratio Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Aspect Ratio</span>
                <label class="switch">
                    <input type="checkbox" id="enableCinematicMode">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Fullscreen Only</span>
                    <span id="key-cinematic" class="key-badge">...</span>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 2px;">
                    <select id="aspectRatio" class="style-select">
                        <option value="21">2:1</option>
                        <option value="235">2.35:1</option>
                        <option value="43">4:3</option>
                    </select>
                    <select id="cinematicStyle" class="style-select">
                        <option value="crop">Crop</option>
                        <option value="stretch">Stretch</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Split Row Section -->
        <div class="feature-row">
            <div class="feature-item">
                <div class="header-row">
                    <span class="feature-name">Hide Shorts</span>
                    <label class="switch">
                        <input type="checkbox" id="enableHideShorts">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="feature-item">
                <div class="header-row">
                    <span class="feature-name">Extra Mode</span>
                    <label class="switch">
                        <input type="checkbox" id="enableExtraMode">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
