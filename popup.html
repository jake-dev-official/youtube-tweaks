<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>YouTubeTweaks Popup</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            width: 280px;
            margin: 0;
            padding: 20px;
            user-select: none;
        }
        h1 {
            font-size: 18px;
            margin: 0 0 20px 0;
            background: linear-gradient(90deg, #3ea6ff, #ff4e45);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        .feature-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .feature-item {
            display: flex;
            flex-direction: column;
            align-items: stretch;
            padding: 12px;
            background: #1e1e1e;
            border-radius: 12px;
            border: 1px solid #333;
            gap: 8px;
            transition: border-color 0.2s;
        }
        .feature-item:hover {
            border-color: #444;
        }
        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .feature-name {
            font-size: 14px;
            font-weight: 600;
            color: #efefef;
        }
        .detail-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .detail-text {
            font-size: 11px;
            color: #999;
            font-weight: 400;
        }

        /* Select Styles */
        .style-select {
            background-color: #333;
            color: white;
            border: 1px solid #444;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 12px;
            outline: none;
            cursor: pointer;
            flex: 1;
        }
        
        /* Premium Switch Styles */
        .switch {
            position: relative;
            display: inline-block;
            width: 44px;
            height: 24px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #333;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider {
            background-color: #3ea6ff;
        }
        input:focus + .slider {
            box-shadow: 0 0 1px #3ea6ff;
        }
        input:checked + .slider:before {
            transform: translateX(20px);
        }

        .footer {
            margin-top: 10px;
            padding-top: 15px;
            text-align: center;
            font-size: 11px;
            color: #666;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .shortcut-link {
            color: #3ea6ff;
            text-decoration: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 12px;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .shortcut-link:hover {
            opacity: 1;
            text-decoration: underline;
        }

        .key-badge {
            background: #333;
            color: #aaa;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 10px;
        }

        .shortcut-grid {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-top: 4px;
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div style="display: flex; flex-direction: column; align-items: center; gap: 4px; margin-bottom: 20px;">
        <img src="icon.png" alt="Logo" style="width: 120px; height: auto; object-fit: contain;">
        <h1 style="margin: 0;">YouTubeTweaks</h1>
    </div>
    <div class="feature-group">
        <!-- Sidebar Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Comments on Right</span>
                <label class="switch">
                    <input type="checkbox" id="enableRightComments">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Side-by-side View</span>
                    <span id="key-right-comments" class="key-badge">...</span>
                </div>
            </div>
        </div>

        <!-- Native Tweaks Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Native Tweaks</span>
                <label class="switch">
                    <input type="checkbox" id="enableShortcuts">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Ask AI (Gemini)</span>
                    <span id="key-gemini" class="key-badge">...</span>
                </div>
                <div class="grid-row">
                    <span class="detail-text">Smart Comments</span>
                    <span id="key-comments" class="key-badge">...</span>
                </div>
            </div>
        </div>

        <!-- Aspect Ratio Section -->
        <div class="feature-item">
            <div class="header-row">
                <span class="feature-name">Aspect Ratio</span>
                <label class="switch">
                    <input type="checkbox" id="enableCinematicMode">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="detail-grid">
                <div class="grid-row">
                    <span class="detail-text">Fullscreen Only</span>
                    <span id="key-cinematic" class="key-badge">...</span>
                </div>
                <div style="display: flex; gap: 8px; margin-top: 2px;">
                    <select id="aspectRatio" class="style-select">
                        <option value="21">2:1</option>
                        <option value="235">2.35:1</option>
                        <option value="43">4:3</option>
                    </select>
                    <select id="cinematicStyle" class="style-select">
                        <option value="crop">Crop</option>
                        <option value="stretch">Stretch</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="footer">
        <a id="setupShortcuts" class="shortcut-link">Manage Keyboard Shortcuts</a>
    </div>
    <script src="popup.js"></script>
</body>
</html>
