<!DOCTYPE html>
<html>
<head>
    <title>YouTubeGeminiSearch Options</title>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f0f0f;
            color: #ffffff;
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            width: 100%;
            max-width: 400px;
            border: 1px solid #333;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 24px;
            background: linear-gradient(90deg, #4285f4, #34a853, #fbbc05, #ea4335);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 14px;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 8px;
            color: #fff;
            box-sizing: border-box;
            font-size: 16px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: #4285f4;
            box-shadow: 0 0 0 2px rgba(66, 133, 244, 0.2);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #4285f4;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #357ae8;
        }
        .status {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
            height: 20px;
        }
        .success { color: #4caf50; }
        .error { color: #f44336; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gemini Settings</h1>
        <div class="form-group">
            <label for="apiKey">Gemini API Key</label>
            <input type="text" id="apiKey" placeholder="Enter your API key">
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
            <input type="checkbox" id="enableSearch" id="enableSearch" checked style="width: 18px; height: 18px; cursor: pointer;">
            <label for="enableSearch" style="margin-bottom: 0; cursor: pointer;">Enable AI Search Results</label>
        </div>
        <div class="form-group" style="display: flex; align-items: center; gap: 10px; margin-bottom: 24px;">
            <input type="checkbox" id="enableShortcuts" id="enableShortcuts" checked style="width: 18px; height: 18px; cursor: pointer;">
            <label for="enableShortcuts" style="margin-bottom: 0; cursor: pointer;">Enable Keyboard Shortcuts</label>
        </div>
        <button id="save">Save Settings</button>
        <div id="status" class="status"></div>
    </div>
    <script src="options.js"></script>
</body>
</html>
